name: OpenSSF Scorecard Analysis
on:
  schedule:
    # Saturdays at 02:30 UTC
    - cron: "30 2 * * 6"
    # Wednesdays at 02:30 UTC
    - cron: "30 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@13cbe3f90715f4cd0e4ef25806342418e8356147 # PR #109 (fix/release-2.8.2)
    with:
      publish-results: true
