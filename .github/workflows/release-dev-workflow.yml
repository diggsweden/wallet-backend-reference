# Release Workflow Dev
#
# This workflow triggers the dev release orchestrator for development and feature branches.
# It creates dev-tagged artifacts and container images for testing.
#
# Triggers:
# - Manual workflow dispatch
#
# Created artifacts:
# - Container images with dev tags
# - See release summary for full details

name: Release Workflow Dev

on:
  workflow_dispatch:

jobs:
  dev-release:
    permissions:
      contents: read # Read code for building
      packages: write # Push dev images to ghcr.io
    uses: diggsweden/reusable-ci/.github/workflows/release-dev-orchestrator.yml@cd56d63b88cf6f1ebb4dc3431986f4208ab85fc5 # v2.8.1
    with:
      reusable-ci-ref: v2.8.1
      project-type: maven
      # Exercise the full dev SBOM pipeline (build + analyzed-artifact +
      # analyzed-container) on this maven reference repo. r2ps stays on
      # the default `none` for fast feedback.
      sboms: all
    secrets: inherit
